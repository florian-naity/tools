<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Background Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; font-family: 'Poppins', system-ui, sans-serif; padding: 32px; display: flex; flex-direction: column; gap: 32px; }
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
  .row { display: flex; gap: 24px; flex-wrap: wrap; }
  .preview { display: flex; flex-direction: column; gap: 12px; }
  label { color: #f59e0b; font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
  .desc { color: #78716c; font-size: 12px; max-width: 280px; line-height: 1.5; }
  canvas { border-radius: 12px; border: 1px solid #44403c; display: block; }
</style>
</head>
<body>
<div class="row">

  <!-- Option A: Noise flow field -->
  <div class="preview">
    <label>A — Noise flow field</label>
    <canvas id="a" width="300" height="220"></canvas>
    <p class="desc">Particles drift along slow organic curves. Faint amber trails, no dots.</p>
  </div>

  <!-- Option B: Breathing dot grid -->
  <div class="preview">
    <label>B — Breathing dot grid ✦ recommended</label>
    <canvas id="b" width="300" height="220"></canvas>
    <p class="desc">Grid of tiny dots, each pulsing with a slow phase-offset wave.</p>
  </div>

  <!-- Option C: Warm particle network -->
  <div class="preview">
    <label>C — Warm particle network</label>
    <canvas id="c" width="300" height="220"></canvas>
    <p class="desc">Same as personal site, amber palette. Family resemblance.</p>
  </div>

</div>

<script>
// ─── Option A: Flow field ───────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('a');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const COLS = 18, ROWS = 13;
  const CELL_W = W / COLS, CELL_H = H / ROWS;
  const particles = [];
  const COUNT = 120;
  let t = 0;

  function fieldAngle(x, y, t) {
    return Math.sin(x * 0.018 + t * 0.4) * Math.cos(y * 0.022 + t * 0.3) * Math.PI * 2;
  }

  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      life: Math.random() * 80,
      maxLife: 80 + Math.random() * 60,
      trail: []
    });
  }

  function draw() {
    ctx.fillStyle = 'rgba(28,25,23,0.18)';
    ctx.fillRect(0, 0, W, H);
    t += 0.008;

    for (const p of particles) {
      const angle = fieldAngle(p.x, p.y, t);
      const speed = 0.6;
      p.x += Math.cos(angle) * speed;
      p.y += Math.sin(angle) * speed;
      p.life++;
      p.trail.push({x: p.x, y: p.y});
      if (p.trail.length > 18) p.trail.shift();

      if (p.life > p.maxLife || p.x < 0 || p.x > W || p.y < 0 || p.y > H) {
        p.x = Math.random() * W;
        p.y = Math.random() * H;
        p.life = 0;
        p.trail = [];
      }

      if (p.trail.length > 2) {
        const alpha = (p.life / p.maxLife) * 0.35;
        ctx.strokeStyle = `rgba(245,158,11,${alpha})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let i = 1; i < p.trail.length; i++) {
          ctx.lineTo(p.trail[i].x, p.trail[i].y);
        }
        ctx.stroke();
      }
    }
    requestAnimationFrame(draw);
  }
  ctx.fillStyle = '#1c1917';
  ctx.fillRect(0, 0, W, H);
  draw();
})();

// ─── Option B: Breathing dot grid ──────────────────────────────────────────
(function() {
  const canvas = document.getElementById('b');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const SPACING = 18;
  const cols = Math.floor(W / SPACING);
  const rows = Math.floor(H / SPACING);
  const offsetX = (W - (cols - 1) * SPACING) / 2;
  const offsetY = (H - (rows - 1) * SPACING) / 2;
  let t = 0;

  function draw() {
    ctx.fillStyle = '#1c1917';
    ctx.fillRect(0, 0, W, H);
    t += 0.018;

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const x = offsetX + col * SPACING;
        const y = offsetY + row * SPACING;
        const dist = Math.sqrt((col - cols/2)**2 + (row - rows/2)**2);
        const phase = dist * 0.35 - t;
        const pulse = (Math.sin(phase) + 1) / 2;
        const alpha = 0.06 + pulse * 0.22;
        const radius = 0.9 + pulse * 0.5;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(245,158,11,${alpha})`;
        ctx.fill();
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── Option C: Warm particle network ───────────────────────────────────────
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const COUNT = 50;
  const DIST = 90;
  const COLOR = '#f59e0b';
  const stars = [];

  for (let i = 0; i < COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
    });
  }

  function draw() {
    ctx.fillStyle = '#1c1917';
    ctx.fillRect(0, 0, W, H);

    for (const s of stars) {
      s.x += s.vx; s.y += s.vy;
      if (s.x < 0 || s.x > W) s.vx *= -1;
      if (s.y < 0 || s.y > H) s.vy *= -1;
    }

    for (let i = 0; i < stars.length; i++) {
      for (let j = i + 1; j < stars.length; j++) {
        const dx = stars[i].x - stars[j].x;
        const dy = stars[i].y - stars[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < DIST) {
          ctx.globalAlpha = (1 - d / DIST) * 0.35;
          ctx.strokeStyle = COLOR;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(stars[i].x, stars[i].y);
          ctx.lineTo(stars[j].x, stars[j].y);
          ctx.stroke();
        }
      }
    }

    ctx.globalAlpha = 0.5;
    ctx.fillStyle = COLOR;
    for (const s of stars) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
